<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Clone</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="ui-overlay">
            <div class="score-display">
                <div class="current-score">0</div>
                <div class="high-score">HIGH: 0</div>
            </div>
            <div class="sound-control">
                <button id="soundToggle" class="sound-btn">🔊</button>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="startScreen" class="screen active">
            <h1>🐦 FLAPPY BIRD</h1>
            <p>Klik atau tekan SPASI untuk mulai</p>
            <div class="instruction">
                🖱️ Klik | ⏸️ Spasi | 📱 Tap
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="screen">
            <h2>💥 GAME OVER</h2>
            <div class="final-scores">
                <div>Score: <span id="finalScore">0</span></div>
                <div>High Score: <span id="finalHighScore">0</span></div>
            </div>
            <button id="restartBtn">🔄 MAIN LAGI</button>
        </div>

        <!-- Pause Screen -->
        <div id="pauseScreen" class="screen">
            <h2>⏸️ PAUSED</h2>
            <p>Klik untuk lanjut</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
